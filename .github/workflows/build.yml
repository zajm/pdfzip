name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libxkbcommon0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-shape0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name PDFZip \
            --add-data "src/pdfzip:pdfzip" \
            src/pdfzip/__main__.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFZip-linux
          path: dist/PDFZip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name PDFZip `
            --add-data "src/pdfzip;pdfzip" `
            src/pdfzip/__main__.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFZip-windows
          path: dist/PDFZip.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: PDFZip-linux
          path: linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: PDFZip-windows
          path: windows

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Rename artifacts with version
        run: |
          mv linux/PDFZip linux/PDFZip-${{ steps.version.outputs.VERSION }}-linux
          mv windows/PDFZip.exe windows/PDFZip-${{ steps.version.outputs.VERSION }}-windows.exe
          chmod +x linux/PDFZip-${{ steps.version.outputs.VERSION }}-linux

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: PDFZip ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: |
            linux/PDFZip-${{ steps.version.outputs.VERSION }}-linux
            windows/PDFZip-${{ steps.version.outputs.VERSION }}-windows.exe
          body: |
            ## PDFZip ${{ steps.version.outputs.VERSION }}

            PDF page interleaver with GUI and CLI support.

            ### Downloads
            - **Linux**: `PDFZip-${{ steps.version.outputs.VERSION }}-linux`
            - **Windows**: `PDFZip-${{ steps.version.outputs.VERSION }}-windows.exe`

            ### Installation via pip
            ```bash
            pip install pdfzip
            ```

            ### Usage
            ```bash
            # GUI mode
            pdf-zip

            # CLI mode
            pdf-zip -a odd_pages.pdf -b even_pages.pdf -o combined.pdf
            ```
